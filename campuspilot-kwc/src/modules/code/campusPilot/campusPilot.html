<template>
  <section class={shellClass}>
    <aside class="sidebar" aria-label="CampusPilot navigation">
      <div class="brand">
        <span class="brand-mark">CP</span>
        <div>
          <strong>启航智伴</strong>
          <small>CampusPilot</small>
        </div>
      </div>

      <template for:each={navGroups} for:item="group">
        <nav key={group.group} class="nav-group" aria-label={group.group}>
          <p>{group.group}</p>
          <template for:each={group.items} for:item="item">
            <button key={item.id} class={item.className} data-page={item.id} onclick={handleNavigate}>
              <span class="nav-dot" aria-hidden="true"></span>
              <b>{item.label}</b>
            </button>
          </template>
        </nav>
      </template>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">{pageKicker}</p>
          <h1>{pageHeading}</h1>
          <p>{pageSubtitle}</p>
        </div>
        <div class="top-actions">
          <label class="search-box">
            <span>⌕</span>
            <input type="search" placeholder="搜索学生 / 课程 / 预警单" />
          </label>
          <button class="icon-button" type="button" onclick={handleRefresh}>↻</button>
          <label class="role-switcher">
            <span>{userInitial}</span>
            <select value={role} onchange={handleRoleChange}>
              <option value="student">学生</option>
              <option value="counselor">辅导员</option>
              <option value="mentor">导师</option>
              <option value="manager">学院管理者</option>
            </select>
          </label>
        </div>
      </header>

      <main class="content">
        <div class="status-strip">
          <span>{statusText}</span>
          <span>{roleName}</span>
          <span>{userName}</span>
        </div>

        <section if:true={isHome} class="page-stack">
          <div class="home-hero">
            <div>
              <p class="eyebrow">学业风险驾驶舱</p>
              <h2>从风险发现到帮扶复评，一页看清今天要处理什么。</h2>
              <p>首页保留原系统的业务入口感：按角色进入画像、预警、帮扶和管理视图。</p>
            </div>
            <div class="hero-focus">
              <span>今日重点</span>
              <strong>{selectedWarning.student}</strong>
              <p>{selectedWarning.title}</p>
            </div>
          </div>

          <div class="metrics-grid">
            <template for:each={metrics} for:item="metric">
              <article key={metric.label} class={metric.className}>
                <span>{metric.label}</span>
                <strong>{metric.value}</strong>
                <small>{metric.note}</small>
              </article>
            </template>
          </div>

          <div class="home-grid">
            <template for:each={homeCards} for:item="card">
              <article key={card.title} class="home-card">
                <span>{card.title}</span>
                <strong>{card.value}</strong>
                <p>{card.text}</p>
              </article>
            </template>
          </div>
        </section>

        <section if:true={isDashboard} class="page-stack">
          <div class="metrics-grid">
            <template for:each={metrics} for:item="metric">
              <article key={metric.label} class={metric.className}>
                <span>{metric.label}</span>
                <strong>{metric.value}</strong>
                <small>{metric.note}</small>
              </article>
            </template>
          </div>

          <div class="dashboard-grid">
            <article class="panel risk-panel">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">风险结构</p>
                  <h2>学业风险分布</h2>
                </div>
                <span class="tag">实时画像</span>
              </div>
              <div class="chart-bars">
                <template for:each={riskChartRows} for:item="risk">
                  <section key={risk.key}>
                    <div><span>{risk.label}</span><strong>{risk.value}</strong></div>
                    <i><b style={risk.barStyle}></b></i>
                    <small>{risk.percent}%</small>
                  </section>
                </template>
              </div>
            </article>

            <article class="panel trend-panel">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">趋势图表</p>
                  <h2>近四周风险变化</h2>
                </div>
              </div>
              <div class="trend-chart">
                <template for:each={trendRows} for:item="item">
                  <section key={item.label}>
                    <div class="trend-bars">
                      <i style={item.highStyle}></i>
                      <i style={item.watchStyle}></i>
                      <i style={item.normalStyle}></i>
                    </div>
                    <span>{item.label}</span>
                  </section>
                </template>
              </div>
              <div class="legend-row">
                <span>高风险</span><span>需关注</span><span>正常</span>
              </div>
            </article>
          </div>

          <div class="dashboard-grid bottom">
            <article class="panel focus-panel">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">今日重点</p>
                  <h2>{selectedWarning.title}</h2>
                </div>
                <span class={selectedWarning.statusClass}>{selectedWarning.status}</span>
              </div>
              <div class="summary-table">
                <div><span>学生</span><strong>{selectedWarning.student}</strong></div>
                <div><span>风险等级</span><strong>{selectedWarning.level}</strong></div>
                <div><span>风险分数</span><strong>{selectedWarning.score}</strong></div>
                <div><span>复评时间</span><strong>{selectedWarning.reviewAt}</strong></div>
              </div>
              <p>{selectedWarning.counselorNote}</p>
            </article>

            <article class="panel effectiveness-panel">
              <div class="panel-head">
                <div>
                  <p class="eyebrow">帮扶成效</p>
                  <h2>处理效率</h2>
                </div>
              </div>
              <div class="effect-grid">
                <div><span>响应率</span><strong>{effectiveness.responseRate}%</strong></div>
                <div><span>改善率</span><strong>{effectiveness.improvedRate}%</strong></div>
                <div><span>已结案</span><strong>{effectiveness.closedWarnings}</strong></div>
                <div><span>平均天数</span><strong>{effectiveness.averageHandleDays}</strong></div>
              </div>
            </article>
          </div>
        </section>

        <section if:true={isStudents} class="two-column student-page">
          <article class="panel list-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">画像列表</p>
                <h2>学生画像列表</h2>
              </div>
              <span class="tag">{students.length} 人</span>
            </div>
            <div class="student-list">
              <template for:each={studentCards} for:item="student">
                <button key={student.no} class={student.rowClass} data-no={student.no} onclick={handleSelectStudent}>
                  <span class={student.riskClass}>{student.riskLevel}</span>
                  <strong>{student.name}</strong>
                  <small>{student.major} · {student.className}</small>
                  <em>{student.riskScore}</em>
                </button>
              </template>
            </div>
          </article>

          <article class="panel detail-panel">
            <div class="profile-head">
              <span class="avatar large">{selectedStudent.name}</span>
              <div>
                <p class="eyebrow">{selectedStudent.no}</p>
                <h2>{selectedStudent.name}</h2>
                <p>{selectedStudent.college} · {selectedStudent.grade} · {selectedStudent.goal}</p>
              </div>
            </div>
            <div class="mini-metrics">
              <template for:each={selectedStudentMetrics} for:item="metric">
                <div key={metric.label}>
                  <span>{metric.label}</span>
                  <strong>{metric.value}</strong>
                </div>
              </template>
            </div>
            <div class="evidence-list">
              <template for:each={evidenceBars} for:item="bar">
                <div key={bar.label}>
                  <div><span>{bar.label}</span><strong>{bar.text}</strong></div>
                  <i><b style={bar.barStyle}></b></i>
                </div>
              </template>
            </div>
            <div class="note-grid">
              <section><span>风险原因</span><p>{selectedStudent.reason}</p></section>
              <section><span>帮扶建议</span><p>{selectedStudent.advice}</p></section>
            </div>
          </article>
        </section>

        <section if:true={isCourses} class="panel page-stack">
          <div class="panel-head">
            <div>
              <p class="eyebrow">课程成绩</p>
              <h2>课程短板与补强建议</h2>
            </div>
          </div>
          <div class="course-table">
            <template for:each={courseRows} for:item="course">
              <section key={course.course}>
                <div><strong>{course.student}</strong><span>{course.course} · {course.type}</span></div>
                <div class="score-bar"><i><b style={course.scoreStyle}></b></i><strong>{course.score}</strong></div>
                <span class="muted-text">{course.status}</span>
                <p>{course.advice}</p>
              </section>
            </template>
          </div>
        </section>

        <section if:true={isBehavior} class="panel page-stack">
          <div class="panel-head">
            <div>
              <p class="eyebrow">学习行为</p>
              <h2>出勤、作业与活跃度</h2>
            </div>
          </div>
          <div class="behavior-list">
            <template for:each={behaviorRows} for:item="item">
              <section key={item.student}>
                <strong>{item.student}</strong>
                <div class="evidence-list compact">
                  <div><div><span>出勤率</span><strong>{item.attendance}%</strong></div><i><b style={item.attendanceStyle}></b></i></div>
                  <div><div><span>作业完成</span><strong>{item.assignment}%</strong></div><i><b style={item.assignmentStyle}></b></i></div>
                  <div><div><span>活跃度</span><strong>{item.activity}%</strong></div><i><b style={item.activityStyle}></b></i></div>
                </div>
                <small>最近登录：{item.lastLogin}</small>
                <p>{item.note}</p>
              </section>
            </template>
          </div>
        </section>

        <section if:true={isWarnings} class="two-column warning-page">
          <article class="panel list-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">闭环对象</p>
                <h2>风险预警单</h2>
              </div>
              <button class="outline-button" type="button" onclick={handleCreateSuggestion}>生成建议</button>
            </div>
            <div class="warning-list">
              <template for:each={warningRows} for:item="warning">
                <button key={warning.code} class={warning.rowClass} data-code={warning.code} onclick={handleSelectWarning}>
                  <span class={warning.riskClass}>{warning.level}</span>
                  <strong>{warning.title}</strong>
                  <small>{warning.code} · {warning.owner}</small>
                </button>
              </template>
            </div>
          </article>

          <article class="panel warning-detail">
            <div class="panel-head">
              <div>
                <p class="eyebrow">{selectedWarning.code}</p>
                <h2>{selectedWarning.title}</h2>
              </div>
              <span class={selectedWarning.statusClass}>{selectedWarning.status}</span>
            </div>
            <div class="summary-table wide">
              <div><span>学生</span><strong>{selectedWarning.student}</strong></div>
              <div><span>来源</span><strong>{selectedWarning.source}</strong></div>
              <div><span>分数</span><strong>{selectedWarning.score}</strong></div>
              <div><span>复评</span><strong>{selectedWarning.reviewAt}</strong></div>
            </div>
            <div class="timeline-notes">
              <section><span>辅导员意见</span><p>{selectedWarning.counselorNote}</p></section>
              <section><span>导师措施</span><p>{selectedWarning.mentorPlan}</p></section>
              <section><span>学生反馈</span><p>{selectedWarning.studentFeedback}</p></section>
            </div>
          </article>
        </section>

        <section if:true={isAgent} class="agent-workspace">
          <aside class="agent-rail">
            <div class="agent-rail-head">
              <span class="agent-logo">AI</span>
              <div>
                <strong>AI 成长助手</strong>
                <small>CampusPilot Agent</small>
              </div>
            </div>
            <div class="agent-actions">
              <button type="button" data-page="home" onclick={handleNavigate}>主导航</button>
              <button type="button" data-page="warnings" onclick={handleNavigate}>查看预警单</button>
            </div>
            <section class="agent-student-card">
              <span>当前重点学生</span>
              <h2>{selectedStudent.name}</h2>
              <b class={selectedStudentRiskClass}>{selectedStudent.riskLevel}</b>
              <div class="agent-mini-grid">
                <div><strong>{selectedStudent.riskScore}</strong><small>风险分数</small></div>
                <div><strong>{selectedStudent.gpa}</strong><small>GPA</small></div>
                <div><strong>{selectedStudent.attendance}%</strong><small>出勤率</small></div>
                <div><strong>{selectedStudent.failed}</strong><small>挂科数</small></div>
              </div>
            </section>
            <section class="agent-tool-card">
              <template for:each={agentReservedTools} for:item="tool">
                <div key={tool.name}>
                  <span>{tool.name}</span>
                  <b>{tool.status}</b>
                </div>
              </template>
            </section>
            <section class="agent-fields-card">
              <strong>预警单字段</strong>
              <p>学生编号 {selectedWarning.studentNo}</p>
              <p>学生姓名 {selectedWarning.student}</p>
              <p>风险等级 {selectedWarning.level}</p>
              <p>风险分数 {selectedWarning.score}</p>
              <p>处理状态 {selectedWarning.status}</p>
            </section>
          </aside>

          <article class="agent-chat-shell">
            <div class="agent-canvas">
              <div class="agent-message ai first">
                <span>AI</span>
                <section>
                  <strong>CampusPilot 学业成长助手</strong>
                  <p>你好，我可以查询学生画像、课程成绩、学习行为和风险预警单，并生成结构化帮扶建议。你可以直接输入学生姓名或预警单号。</p>
                </section>
              </div>
              <div class="agent-message user">
                <section>
                  <strong>辅导员提问</strong>
                  <p>{selectedStudent.name}现在为什么属于{selectedStudent.riskLevel}？下一步应该怎么处理？</p>
                </section>
                <span>{userInitial}</span>
              </div>
              <div class="agent-message ai">
                <span>AI</span>
                <section>
                  <strong>结构化建议</strong>
                  <p>【风险等级】{selectedStudent.riskLevel}。依据包括挂科数 {selectedStudent.failed}、出勤率 {selectedStudent.attendance}%、作业完成率 {selectedStudent.assignment}% 和当前预警分数 {selectedStudent.riskScore}。建议辅导员确认 {selectedWarning.code}，导师制定 4 周补强计划，并在 {selectedWarning.reviewAt} 复评。</p>
                  <div class="agent-tags"><b>学生画像</b><b>课程成绩</b><b>学习行为</b><b>风险预警单</b></div>
                </section>
              </div>
            </div>
            <div class="agent-quick-row">
              <button type="button">查看{selectedStudent.name}当前风险情况</button>
              <button type="button">{selectedStudent.name}是否需要生成预警单</button>
              <button type="button">为陈思琪生成成长规划</button>
              <button type="button">列出待辅导员确认的预警单</button>
            </div>
            <div class="agent-input-area">
              <label>
                <span>输入问题</span>
                <textarea value={question} oninput={handleQuestionInput} placeholder="例如：张明远下一步应该由谁处理？是否需要生成风险预警单？"></textarea>
              </label>
              <button class="agent-send" type="button" onclick={handleAskAgent}>→</button>
            </div>
          </article>
        </section>
        <section if:true={isWorkflow} class="workflow-grid">
          <article class="panel timeline-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">处理流程</p>
                <h2>帮扶闭环时间线</h2>
              </div>
              <span class="tag">workflow</span>
            </div>
            <div class="timeline">
              <template for:each={workflowCards} for:item="step">
                <section key={step.step}>
                  <span>{step.order}</span>
                  <div>
                    <strong>{step.step}</strong>
                    <small>{step.owner} · {step.time}</small>
                    <p>{step.detail}</p>
                  </div>
                </section>
              </template>
            </div>
          </article>

          <article class="panel role-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">角色权限</p>
                <h2>用户协同</h2>
              </div>
            </div>
            <template for:each={roles} for:item="roleItem">
              <section key={roleItem.role}>
                <strong>{roleItem.role}</strong>
                <span>{roleItem.actor}</span>
                <p>{roleItem.duty}</p>
              </section>
            </template>
          </article>
        </section>

        <section if:true={isUsers} class="enterprise-page native-enterprise-page">
          <article class="account-banner">
            <div class="account-identity">
              <span class="account-avatar">{userInitial}</span>
              <div><span class="section-kicker">当前账号</span><h2>{userName}</h2><p>counselor@campus.edu · 信息工程学院</p></div>
            </div>
            <div class="account-summary"><span><b>{roleName}</b><em>当前角色</em></span><span><b>4</b><em>业务权限</em></span><span><b>3</b><em>数据范围</em></span><button class="secondary-button" type="button">切换账号</button></div>
          </article>
          <nav class="enterprise-tabs"><button class="active" type="button">账号概览</button><button type="button">权限与数据范围</button><button type="button">安全与活动</button></nav>
          <div class="enterprise-layout">
            <article class="enterprise-panel">
              <div class="enterprise-head"><div><span class="section-kicker">岗位信息</span><h3>账号与组织归属</h3></div><span class="status-badge success">正常</span></div>
              <div class="detail-list"><div><span>姓名</span><strong>{userName}</strong></div><div><span>角色</span><strong>{roleName}</strong></div><div><span>所属组织</span><strong>信息工程学院</strong></div><div><span>账号类型</span><strong>校内统一身份账号</strong></div><div><span>数据租户</span><strong>CampusPilot 校园租户</strong></div><div><span>账号有效期</span><strong>长期有效</strong></div></div>
            </article>
            <article class="enterprise-panel">
              <div class="enterprise-head"><div><span class="section-kicker">操作记录</span><h3>最近活动</h3></div><span class="text-link">查看流程</span></div>
              <div class="activity-list"><div><i></i><span><strong>查看高风险学生画像</strong><em>今天 11:36 · {userName}</em></span></div><div><i></i><span><strong>确认风险预警单 RW2026001</strong><em>昨天 18:47 · CampusPilot Agent</em></span></div><div><i></i><span><strong>更新导师帮扶措施</strong><em>昨天 18:55 · 陈导师</em></span></div></div>
            </article>
          </div>
          <article class="enterprise-panel">
            <div class="enterprise-head"><div><span class="section-kicker">RBAC 权限模型</span><h3>当前角色授权清单</h3></div><span class="status-badge">{roleName}</span></div>
            <div class="permission-matrix"><div><b>01</b><strong>查看风险学生</strong><em>已授权</em></div><div><b>02</b><strong>确认风险预警单</strong><em>已授权</em></div><div><b>03</b><strong>填写辅导员意见</strong><em>已授权</em></div><div><b>04</b><strong>跟踪处理状态</strong><em>已授权</em></div></div>
          </article>
        </section>

        <section if:true={isSettings} class="enterprise-page native-enterprise-page">
          <article class="settings-toolbar"><div><span class="section-kicker">运行环境</span><strong>CampusPilot 生产配置</strong><em>最后保存：2026-07-11 11:36 · 学院管理员</em></div><span class="environment-badge"><i></i>运行正常</span><button class="secondary-button" type="button">连接检测</button><button class="primary-button" type="button">保存更改</button></article>
          <nav class="enterprise-tabs"><button class="active" type="button">集成与接口</button><button type="button">风险规则</button><button type="button">通知策略</button><button type="button">安全与审计</button></nav>
          <div class="enterprise-layout settings-layout">
            <article class="enterprise-panel">
              <div class="enterprise-head"><div><span class="section-kicker">苍穹平台</span><h3>业务接口与 Agent 接入</h3><p>密钥由后端或平台安全配置托管，前端仅保存公开连接参数。</p></div><span class="status-badge warning">待配置密钥</span></div>
              <div class="enterprise-form"><label class="wide"><span>苍穹环境地址</span><input value="http://10.0.160.250:8080/ierp" readonly></input></label><label><span>方案标识</span><input value="campuspilot" readonly></input></label><label><span>开发商标识</span><input value="code" readonly></input></label><label><span>领域标识</span><input value="code" readonly></input></label><label><span>第三方应用 ID</span><input value="campuspilot_isv" readonly></input></label><label class="wide"><span>Agent 代理路径</span><input value="/api/campuspilot/agent/chat" readonly></input></label></div>
              <div class="toggle-list"><div><span><strong>启用苍穹 Agent</strong><em>通过后端代理调用平台 Agent</em></span><b class="enterprise-switch on"><i></i></b></div><div><span><strong>结构化建议输出</strong><em>映射到预警单和帮扶计划字段</em></span><b class="enterprise-switch on"><i></i></b></div></div>
            </article>
            <article class="enterprise-panel">
              <div class="enterprise-head"><div><span class="section-kicker">治理基线</span><h3>规则与安全状态</h3></div><span class="status-badge success">已启用</span></div>
              <div class="governance-list"><div><span><strong>高风险学业规则</strong><em>GPA &lt; 2.0 或挂科数 ≥ 2</em></span><b>启用</b></div><div><span><strong>学习行为异常</strong><em>出勤 &lt; 80% 且作业 &lt; 70%</em></span><b>启用</b></div><div><span><strong>操作审计</strong><em>关键业务操作保留 180 天</em></span><b>启用</b></div><div><span><strong>敏感字段策略</strong><em>按当前角色自动脱敏</em></span><b>启用</b></div></div>
            </article>
          </div>
