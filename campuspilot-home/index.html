<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>启航智伴 CampusPilot</title>
    <link rel="stylesheet" href="./styles.css?v=enterprise18" />
  </head>
  <body data-page="app">
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <a class="brand" href="#home" aria-label="CampusPilot 首页">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 32 32">
              <path d="M6 17.5 16 5l10 12.5-4.1 2.2L16 12.3l-5.9 7.4L6 17.5Z" />
              <path d="M8.8 22.5 16 18l7.2 4.5L16 27 8.8 22.5Z" />
            </svg>
          </span>
          <span>
            <strong>启航智伴</strong>
            <small>CampusPilot</small>
          </span>
        </a>

        <nav class="nav-stack" aria-label="业务模块">
          <p class="nav-group">工作台</p>
          <a class="nav-item" data-route="student-home" href="#student-home">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-7 8a7 7 0 0 1 14 0H5Z" /></svg>
            <span>我的工作台</span>
          </a>
          <a class="nav-item" data-route="teacher-home" href="#teacher-home">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14v3H5V4Zm2 5h10v11H7V9Zm2 2v2h6v-2H9Zm0 4v2h4v-2H9Z" /></svg>
            <span>教学工作台</span>
          </a>
          <a class="nav-item" data-route="counselor-home" href="#counselor-home">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 2.8 19h18.4L12 3Zm1 12h-2v2h2v-2Zm0-6h-2v5h2V9Z" /></svg>
            <span>处置工作台</span>
          </a>
          <a class="nav-item" data-route="admin-home" href="#admin-home">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v4H4V5Zm0 6h7v8H4v-8Zm9 0h7v8h-7v-8Z" /></svg>
            <span>治理驾驶舱</span>
          </a>

          <p class="nav-group">业务模块</p>
          <a class="nav-item" data-route="dashboard" href="#dashboard">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h4A1.5 1.5 0 0 1 11 5.5v4A1.5 1.5 0 0 1 9.5 11h-4A1.5 1.5 0 0 1 4 9.5v-4Zm9 0A1.5 1.5 0 0 1 14.5 4h4A1.5 1.5 0 0 1 20 5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4A1.5 1.5 0 0 1 13 9.5v-4ZM4 14.5A1.5 1.5 0 0 1 5.5 13h4a1.5 1.5 0 0 1 1.5 1.5v4A1.5 1.5 0 0 1 9.5 20h-4A1.5 1.5 0 0 1 4 18.5v-4Zm9 0a1.5 1.5 0 0 1 1.5-1.5h4a1.5 1.5 0 0 1 1.5 1.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a1.5 1.5 0 0 1-1.5-1.5v-4Z" /></svg>
            <span>风险驾驶舱</span>
          </a>
          <a class="nav-item" data-route="students" href="#students">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-7 8a7 7 0 0 1 14 0H5Z" /></svg>
            <span>学生画像</span>
          </a>
          <a class="nav-item" data-route="courses" href="#courses">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h13a1 1 0 0 1 1 1v15H6.5A2.5 2.5 0 0 1 4 17.5V5a1 1 0 0 1 1-1Zm1 13.5a.5.5 0 0 0 .5.5H17V6H6v11.5ZM8 8h7v2H8V8Zm0 4h7v2H8v-2Z" /></svg>
            <span>课程成绩</span>
          </a>
          <a class="nav-item" data-route="behavior" href="#behavior">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h3v7H5v-7Zm5-7h3v14h-3V5Zm5 4h3v10h-3V9Z" /></svg>
            <span>学习行为</span>
          </a>
          <a class="nav-item" data-route="warnings" href="#warnings">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 2.8 19h18.4L12 3Zm1 12h-2v2h2v-2Zm0-6h-2v5h2V9Z" /></svg>
            <span>风险预警单</span>
          </a>

          <p class="nav-group">智能闭环</p>
          <a class="nav-item" data-route="agent" href="#agent">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a1 1 0 0 1 1 1v1.1A7.5 7.5 0 0 1 19.5 12v3.5A3.5 3.5 0 0 1 16 19h-1.8l-1.5 2.3a.8.8 0 0 1-1.4 0L9.8 19H8a3.5 3.5 0 0 1-3.5-3.5V12A7.5 7.5 0 0 1 11 4.1V3a1 1 0 0 1 1-1Zm-3 10.2a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4Zm6 0a1.2 1.2 0 1 0 0-2.4 1.2 1.2 0 0 0 0 2.4Zm-6.5 3.1c1.9 1.2 5.1 1.2 7 0l-.8-1.3c-1.4.8-4 .8-5.4 0l-.8 1.3Z" /></svg>
            <span>AI 成长助手</span>
          </a>
          <button class="agent-context-return nav-context-return" type="button" id="agentContextToggle">助手上下文</button>
          <a class="nav-item" data-route="workflow" href="#workflow">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 5a3 3 0 1 1 2.8 4H14a3 3 0 0 1 3 3v3.2a3 3 0 1 1-2 0V12a1 1 0 0 0-1-1H9.8A3 3 0 1 1 7 5Z" /></svg>
            <span>处理闭环</span>
          </a>

          <p class="nav-group">组织与系统</p>
          <a class="nav-item" data-route="user" href="#user">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-7 8a7 7 0 0 1 14 0H5Z" /></svg>
            <span>用户中心</span>
          </a>
          <a class="nav-item" data-route="settings" href="#settings">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m19.4 13.5 1.2.9-2 3.4-1.4-.6a7.4 7.4 0 0 1-1.8 1l-.2 1.5h-4l-.2-1.5a7.4 7.4 0 0 1-1.8-1l-1.4.6-2-3.4 1.2-.9a6.7 6.7 0 0 1 0-2.1l-1.2-.9 2-3.4 1.4.6a7.4 7.4 0 0 1 1.8-1l.2-1.5h4l.2 1.5a7.4 7.4 0 0 1 1.8 1l1.4-.6 2 3.4-1.2.9a6.7 6.7 0 0 1 0 2.1ZM13 15.5a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" /></svg>
            <span>系统设置</span>
          </a>
        </nav>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="routeEyebrow">AI 原生智慧校园平台</p>
            <h1 id="routeTitle">CampusPilot 学业风险驾驶舱</h1>
            <p class="route-subtitle" id="routeSubtitle">学生画像、风险预警、Agent 分析与帮扶闭环的一体化工作台。</p>
          </div>
          <div class="top-actions">
            <label class="search-box">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.8 4a6.8 6.8 0 1 1 0 13.6 6.8 6.8 0 0 1 0-13.6Zm0 2a4.8 4.8 0 1 0 0 9.6 4.8 4.8 0 0 0 0-9.6Zm5.4 9 3.8 3.8-1.4 1.4-3.8-3.8 1.4-1.4Z" /></svg>
              <input id="globalSearch" type="search" placeholder="搜索学生 / 课程 / 预警单" autocomplete="off" />
            </label>
            <button class="icon-button" type="button" id="refreshButton" aria-label="刷新数据">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.5 7.3A8 8 0 1 0 20 12h-2a6 6 0 1 1-1.1-3.5L14 11.4h7V4.3l-2.5 3Z" /></svg>
            </button>
            <a class="auth-link" data-auth-control="login" href="./login.html">登录</a>
            <a class="auth-link primary" data-auth-control="register" href="./login.html#register">注册</a>
            <a class="user-button" data-auth-control="user" href="#user" aria-label="进入用户中心">
              <span class="avatar small" id="topAvatar">王</span>
              <span>
                <strong id="topUserName">王老师</strong>
                <small id="topUserRole">辅导员</small>
              </span>
            </a>
          </div>
        </header>

        <section id="appView" class="route-view" aria-live="polite"></section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js?v=enterprise18"></script>
  </body>
</html>
